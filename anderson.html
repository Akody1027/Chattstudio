<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Support Pro</title>
    <style>
        :root { --bg: #121212; --accent: #4285f4; --danger: #ea4335; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; height: 98vh;}
        
        /* Main Container for Full Screen Video */
        #video-viewport { position: relative; width: 100vw; height: 85vh; background: #000; }
        
        /* The Remote Video (The person you are helping) - Large View */
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; }
        
        /* The Local Video (You) - Small Picture-in-Picture */
        #localVideo { 
            position: absolute; bottom: 20px; right: 20px; 
            width: 120px; height: 160px; 
            background: #222; border: 2px solid white; border-radius: 12px; 
            object-fit: cover; z-index: 10; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .controls { 
            height: 15vh; display: flex; justify-content: center; 
            align-items: center; gap: 20px; background: #1a1a1a; 
        }

        button { 
            padding: 18px 35px; font-size: 1rem; font-weight: bold; 
            border-radius: 50px; border: none; cursor: pointer; 
        }
        #startBtn { background: var(--accent); color: white; }
        #hangup { background: var(--danger); color: white; display: none; }
    </style>
</head>
<body>

    <div id="video-viewport">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay playsinline muted title="Click to swap views"></video>
    </div>

    <div class="controls">
        <button id="startBtn">Start Call</button>
        <button id="hangup" onclick="location.reload()">End Call</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAr8LM3SK09J-44-aQHCOT1mC_ma5ALGT0",
            authDomain: "realcall-dbffb.firebaseapp.com",
            projectId: "realcall-dbffb",
            storageBucket: "realcall-dbffb.firebasestorage.app",
            messagingSenderId: "453538491966",
            appId: "1:453538491966:web:249f5022bcd1ccf41aab6f"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const ROOM_ID = "GrandparentsSupportRoom"; 
        let pc;

        const startBtn = document.getElementById('startBtn');
        const hangupBtn = document.getElementById('hangup');

        async function initCall() {
            startBtn.style.display = 'none';
            hangupBtn.style.display = 'block';

            pc = new RTCPeerConnection({
                iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }]
            });

            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: 640, height: 480, frameRate: 15 }, 
                audio: true 
            });
            
            document.getElementById('localVideo').srcObject = stream;
            stream.getTracks().forEach(track => pc.addTrack(track, stream));

            pc.ontrack = (event) => {
                document.getElementById('remoteVideo').srcObject = event.streams[0];
            };

            const callDoc = db.collection('calls').doc(ROOM_ID);
            const offerCandidates = callDoc.collection('offerCandidates');
            const answerCandidates = callDoc.collection('answerCandidates');

            pc.onicecandidate = (e) => e.candidate && (isCaller ? offerCandidates : answerCandidates).add(e.candidate.toJSON());

            const doc = await callDoc.get();
            const isCaller = !doc.exists || !doc.data().offer;

            if (isCaller) {
                const offerDescription = await pc.createOffer();
                await pc.setLocalDescription(offerDescription);
                await callDoc.set({ offer: { sdp: offerDescription.sdp, type: offerDescription.type } });
                callDoc.onSnapshot(s => {
                    const d = s.data();
                    if (!pc.currentRemoteDescription && d?.answer) pc.setRemoteDescription(new RTCSessionDescription(d.answer));
                });
            } else {
                await pc.setRemoteDescription(new RTCSessionDescription(doc.data().offer));
                const answerDescription = await pc.createAnswer();
                await pc.setLocalDescription(answerDescription);
                await callDoc.update({ answer: { sdp: answerDescription.sdp, type: answerDescription.type } });
            }

            offerCandidates.onSnapshot(s => s.docChanges().forEach(c => c.type === 'added' && pc.addIceCandidate(new RTCIceCandidate(c.doc.data()))));
            answerCandidates.onSnapshot(s => s.docChanges().forEach(c => c.type === 'added' && pc.addIceCandidate(new RTCIceCandidate(c.doc.data()))));
        }

        // View Swapping Logic
        document.getElementById('localVideo').onclick = () => {
            const local = document.getElementById('localVideo');
            const remote = document.getElementById('remoteVideo');
            const tempSrc = local.srcObject;
            local.srcObject = remote.srcObject;
            remote.srcObject = tempSrc;
        };

        startBtn.onclick = initCall;
    </script>
</body>
</html>
